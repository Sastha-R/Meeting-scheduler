<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <!-- Logo -->

    </a>

    <!-- Right Side -->
    <div class="d-flex align-items-center gap-3">

      <!-- User Info -->

        <div class="fw-semibold" id="userName"></div>

      </div>

      <!-- Theme Toggle -->
      <button
        class="btn btn-outline-brand"
        type="button"
        title="Toggle Theme"
        data-theme-toggle>
        <i class="bi bi-moon-stars"></i>
      </button>

      <!-- Logout -->
      <button
        class="btn btn-brand"
        id="logoutBtn"
        type="button">
        <i class="bi bi-box-arrow-right me-1"></i>
        Logout
      </button>

    </div>

  </div>
</nav>

<section class="container mt-4">
  <div class="row g-3 align-items-stretch mb-3">
    <div class="col-md-4">
      <div class="stat-card">
        <span class="stat-icon"><i class="bi bi-calendar-day"></i></span>
        <div>
          <p>Today's Meeting Count</p>
          <strong id="todayMeetingCount">0</strong>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <span class="stat-icon"><i class="bi bi-calendar-week"></i></span>
        <div>
          <p>This Week Meetings Count</p>
          <strong id="weekMeetingCount">0</strong>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <span class="stat-icon"><i class="bi bi-calendar-check"></i></span>
        <div>
          <p>Total Meeting Count</p>
          <strong id="totalMeetingCount">0</strong>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-end manager-only">
    <button class="btn btn-brand" type="button" id="createMeetingBtn">
      Create Meeting
    </button>
  </div>
</section>



<div class="modal fade" id="meetingModal" tabindex="-1">
  <div class="modal-dialog modal-lg ">
    <div class="modal-content">

      <form id="meetingForm">
        <div class="modal-header">
          <h2 class="modal-title h5" id="meetingModalTitle">Create Meeting</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">

            <div class="col-md-6">
              <label for="meetingTitle" class="form-label">Meeting Title</label>
              <input type="text" id="meetingTitle" class="form-control">
            </div>

            <div class="col-md-6">
              <label for="meetingDuration" class="form-label">Duration</label>
              <input type="text" id="meetingDuration" class="form-control" placeholder="60 minutes">
            </div>

            <div class="col-12">
              <label for="meetingDescription" class="form-label">Description</label>
              <textarea id="meetingDescription" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-md-6">
              <label for="meetingDate" class="form-label">Date</label>
              <input type="date" id="meetingDate" class="form-control">
              <div class="field-message" id="meetingDateMessage"></div>
            </div>

            <div class="col-md-6">
              <label for="meetingTime" class="form-label">Time</label>
              <input type="time" id="meetingTime" class="form-control">
            </div>

            <div class="col-md-6">
              <label for="meetingRoom" class="form-label">Room</label>
             <select id="meetingRoom" class="form-select">
                <option value="">Select room</option>
                <option value="Floor 1 - Room 101">Floor 1 - Room 101</option>
                <option value="Floor 1 - Room 102">Floor 1 - Room 102</option>
                 <option value="Floor 2 - Room 201">Floor 2 - Room 201</option>
                <option value="Floor 2 - Room 202">Floor 2 - Room 202</option>
                 <option value="Floor 3 - Room 301">Floor 3 - Room 301</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="meetingType" class="form-label">Meeting Type</label>
              <select id="meetingType" class="form-select">
                <option value="">Select type</option>
                <option value="One Time">One Time</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Monthly">Monthly</option>
              </select>
            </div>

            <div class="col-md-6 d-none" id="meetingStatusGroup">
              <label for="meetingStatus" class="form-label">Status</label>
            <select id="meetingStatus" class="form-select">
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
            </select>
        </div>

            <div class="col-12">
              <label class="form-label">Participants</label>
              <div id="participantsList" class="border rounded p-3">
                Loading participants...
              </div>
            </div>

            <div class="col-12">
              <p id="meetingMessage" class="text-danger mb-0"></p>
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">
            Cancel Edit
          </button>

          <button type="submit" class="btn btn-primary">
            Save Meeting
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<section class="container mt-4">
  <div class="row g-3 align-items-end">

    <div class="col-md-3">
      <label for="fromDateFilter" class="form-label">From Date</label>
      <input type="date" id="fromDateFilter" class="form-control">
    </div>

    <div class="col-md-3">
      <label for="toDateFilter" class="form-label">To Date</label>
      <input type="date" id="toDateFilter" class="form-control">
    </div>

    <div class="col-md-6">
      <label class="form-label d-block">Status</label>

      <div class="d-flex flex-wrap gap-2">
        <button
          type="button"
          class="btn btn-outline-primary status-filter"
          data-status="All">
          All
        </button>

        <button
          type="button"
          class="btn btn-outline-info status-filter"
          data-status="Scheduled">
          Scheduled
        </button>

        <button
          type="button"
          class="btn btn-outline-success status-filter"
          data-status="Completed">
          Completed
        </button>

        <button
          type="button"
          class="btn btn-outline-danger status-filter"
          data-status="Cancelled">
          Cancelled
        </button>

        <button
          type="button"
          class="btn btn-outline-brand"
          id="deletedMeetingsBtn">
          Deleted Meetings
        </button>
      </div>
    </div>
    <div class="col-12">
      <button type="button" class="btn btn-outline-brand btn-sm" id="clearDateFilterBtn">
        Clear Dates
      </button>
    </div>

  </div>
</section>

<section class="container mt-4 mb-5">
  <div class="card">
    <div class="card-header">
      <h2 class="h5 mb-0">My Meetings</h2>
    </div>

    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead class="table-light">
            <tr>
              <th>Title</th>
              <th>Description</th>
              <th>Date</th>
              <th>Time</th>
              <th>Duration</th>
              <th>Room</th>
              <th>Type</th>
              <th>Organizer</th>
              <th>Status</th>
              <th class="actions-column">Actions</th>
            </tr>
          </thead>

          <tbody id="meetingsTableBody">
            <tr>
              <td colspan="10" class="text-center text-muted">
                Loading meetings...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/dashboard.js"></script>
  <!-- <script src = "/js/dashboard.js"></script> -->
</body>
</html>
